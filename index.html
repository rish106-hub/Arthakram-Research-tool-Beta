<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Research Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --text: #e8e8e8;
      --card: #111111;
      --border: #1e1e1e;
      --accent: #f0f0f0;
      --muted: #555;
      --prompt-bg: #0a0f1a;
      --prompt-border: #1a2a3a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 32px;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: #333; }
    textarea:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }

    #analyzeBtn {
      background: var(--accent);
      color: #080808;
      padding: 10px 24px;
    }

    #analyzeBtn:hover:not(:disabled) { opacity: 0.85; }
    #analyzeBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    #pdfBtn {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
    }

    #pdfBtn:hover:not(:disabled) { border-color: #333; }
    #pdfBtn:disabled { opacity: 0.45; cursor: not-allowed; color: var(--muted); }

    .loader {
      display: none;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      margin-left: 4px;
    }

    .loader.active { display: flex; }

    .dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    #output { display: none; }

    .error-box {
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 6px;
      padding: 14px 16px;
      color: #e87070;
      font-size: 0.9rem;
      font-family: 'Fira Code', monospace;
    }

    .result-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
    }

    /* Markdown styles */
    .result-content h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      margin-top: 36px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .result-content h2:first-child { margin-top: 0; }

    .result-content h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #aaa;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .result-content p {
      font-size: 0.93rem;
      line-height: 1.75;
      color: #ccc;
      margin-bottom: 12px;
    }

    .result-content ul, .result-content ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .result-content li {
      font-size: 0.93rem;
      line-height: 1.7;
      color: #ccc;
      margin-bottom: 4px;
    }

    .result-content strong { color: var(--text); font-weight: 500; }
    .result-content em { color: #aaa; }

    .result-content code {
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: #d4d4d4;
    }

    .result-content pre {
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    .result-content pre code {
      background: none;
      border: none;
      padding: 0;
    }

    .result-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* Perplexity Prompt section special styling */
    .perplexity-section {
      background: var(--prompt-bg);
      border: 1px solid var(--prompt-border);
      border-radius: 8px;
      padding: 20px 24px;
      margin-top: 8px;
      position: relative;
    }

    .perplexity-section p,
    .perplexity-section li {
      font-family: 'Fira Code', monospace;
      font-size: 0.82rem;
      line-height: 1.8;
      color: #b0c4de;
    }

    .perplexity-section ul,
    .perplexity-section ol {
      padding-left: 18px;
    }

    .perplexity-section strong { color: #c8dff5; }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      background: transparent;
      border: 1px solid var(--prompt-border);
      color: #6a8cae;
      font-family: 'Fira Code', monospace;
      font-size: 0.78rem;
      padding: 7px 14px;
      border-radius: 4px;
      transition: border-color 0.15s, color 0.15s;
    }

    .copy-btn:hover { border-color: #3a5a7a; color: #90b4d4; }
    .copy-btn.copied { color: #6aae8c; border-color: #2a5a3a; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Arthakram Research</h1>
      <p>Paste your problem statement. Get research that wins.</p>
    </header>

    <div class="input-card">
      <textarea
        id="problemInput"
        placeholder="Paste your case competition problem statement here..."
      ></textarea>
      <div class="btn-row">
        <button id="analyzeBtn" onclick="analyze()">Analyse</button>
        <button id="pdfBtn">Upload PDF</button>
        <input type="file" id="pdfInput" accept="application/pdf" style="display: none;" />
        <div class="loader" id="loader">
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
          Analysing...
        </div>
      </div>
    </div>

    <div id="output"></div>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    async function analyze() {
      const input = document.getElementById('problemInput');
      const btn = document.getElementById('analyzeBtn');
      const pdfBtn = document.getElementById('pdfBtn');
      const loader = document.getElementById('loader');
      const output = document.getElementById('output');

      const problem = input.value.trim();
      if (!problem) return;

      // Loading state
      btn.disabled = true;
      btn.textContent = 'Analysing...';
      input.disabled = true;
      if (pdfBtn) pdfBtn.disabled = true;
      loader.classList.add('active');
      output.style.display = 'none';
      output.innerHTML = '';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          output.innerHTML = `<div class="error-box">Error: ${data.error || 'Unknown error'}</div>`;
          output.style.display = 'block';
          return;
        }

        const html = marked.parse(data.result);
        output.innerHTML = `<div class="result-content" id="resultContent">${html}</div>`;
        output.style.display = 'block';

        injectPerplexityFormatting();
        injectCopyButton();

      } catch (err) {
        output.innerHTML = `<div class="error-box">Network error: ${err.message}</div>`;
        output.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyse';
        input.disabled = false;
        if (pdfBtn) pdfBtn.disabled = false;
        loader.classList.remove('active');
      }
    }

    function injectPerplexityFormatting() {
      const content = document.getElementById('resultContent');
      if (!content) return;

      const headings = content.querySelectorAll('h2');
      headings.forEach(h2 => {
        if (h2.textContent.toLowerCase().includes('perplexity prompt')) {
          // Wrap everything between this h2 and the next h2 in a perplexity-section div
          const wrapper = document.createElement('div');
          wrapper.className = 'perplexity-section';
          wrapper.id = 'perplexitySection';

          let next = h2.nextElementSibling;
          const nodes = [];
          while (next && next.tagName !== 'H2') {
            nodes.push(next);
            next = next.nextElementSibling;
          }

          h2.insertAdjacentElement('afterend', wrapper);
          nodes.forEach(n => wrapper.appendChild(n));
        }
      });
    }

    function injectCopyButton() {
      const section = document.getElementById('perplexitySection');
      if (!section) return;

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.id = 'copyBtn';
      btn.textContent = 'Copy Prompt';

      btn.onclick = () => {
        const text = section.innerText.replace('Copy Prompt', '').trim();
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy Prompt';
            btn.classList.remove('copied');
          }, 2000);
        });
      };

      section.appendChild(btn);
    }

    // PDF Upload logic
    const pdfBtn = document.getElementById('pdfBtn');
    const pdfInput = document.getElementById('pdfInput');

    if (pdfBtn && pdfInput) {
      pdfBtn.onclick = () => {
        pdfInput.click();
      };

      pdfInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const input = document.getElementById('problemInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        
        pdfBtn.disabled = true;
        pdfBtn.textContent = 'Extracting...';
        if (analyzeBtn) analyzeBtn.disabled = true;
        
        const formData = new FormData();
        formData.append('file', file);
        
        try {
          const res = await fetch('/extract-pdf', {
            method: 'POST',
            body: formData
          });
          
          const data = await res.json();
          
          if (!res.ok || data.error) {
            alert(`Error: ${data.error || 'Unknown error'}`);
          } else {
            input.value = data.text;
          }
        } catch (err) {
          alert(`Error uploading file: ${err.message}`);
        } finally {
          pdfBtn.disabled = false;
          pdfBtn.textContent = 'Upload PDF';
          pdfInput.value = ''; // reset
          if (analyzeBtn) analyzeBtn.disabled = false;
        }
      };
    }

    // Allow Ctrl+Enter / Cmd+Enter to submit
    document.getElementById('problemInput').addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
